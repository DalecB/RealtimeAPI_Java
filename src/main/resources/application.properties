spring.application.name=RealtimeAPI

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/realtime_ranking
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Snapshot Worker ---
# Worker is opt-in by default. Enable it explicitly in a local profile or runtime args.
snapshots.worker.enabled=false
snapshots.worker.delay-ms=30000
snapshots.worker.top-n=1000
snapshots.worker.max-attempts=3
snapshots.worker.retry-delay-ms=5000
snapshots.recovery.enabled=true
snapshots.recovery.top-n=1000

# --- Redis ---
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6370}
# PRD 10 기준으로 Redis 장애 시 fail-fast 해야 하므로,
# local/dev 기본값도 연결/명령 타임아웃을 짧게 둔다.
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=2s

# --- Admin Auth (JWT) ---
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:local-dev-admin-jwt-secret-change-me}
app.auth.jwt.ttl-seconds=3600

# --- Hot Path Optimizations ---
app.api-key.cache-ttl=1m
app.usage-stats.flush-delay-ms=1000
app.usage-stats.flush-initial-delay-ms=1000

# --- Redis Hot Path Circuit Breaker ---
events.circuit-breaker.sliding-window-size=10
events.circuit-breaker.failure-rate-threshold=50
events.circuit-breaker.wait-duration-in-open-state=10s
events.circuit-breaker.permitted-calls-in-half-open-state=3

# --- Actuator / Prometheus ---
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
